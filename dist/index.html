<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmic Genesis — 宇宙創世模擬器</title>
  <style>
    /* ===== 全域重設 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ===== Three.js Canvas 容器 ===== */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    /* ===== HUD 覆蓋層 ===== */
    #hud {
      position: fixed;
      z-index: 10;
      pointer-events: none;
      font-size: 13px;
      letter-spacing: 0.3px;
    }

    #hud * {
      pointer-events: auto;
    }

    /* 左上角：模擬資訊 */
    #hud-info {
      position: fixed;
      top: 24px;
      left: 24px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 16px 20px;
      min-width: 180px;
      font-family: 'SF Mono', 'Consolas', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.8);
    }

    #hud-info .label {
      color: rgba(255, 255, 255, 0.4);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #hud-info .value {
      color: rgba(255, 255, 255, 0.95);
      float: right;
    }

    /* 右下角：控制按鈕 */
    #hud-controls {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 10px 16px;
    }

    #hud-controls button {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.7);
      padding: 6px 14px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }

    #hud-controls button:hover {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.25);
    }

    #hud-controls button.active {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.3);
      color: #fff;
    }

    /* 右上角：品質設定 */
    #hud-quality {
      position: fixed;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 4px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 6px;
    }

    #hud-quality button {
      background: transparent;
      border: none;
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.4);
      padding: 6px 12px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }

    #hud-quality button:hover {
      color: rgba(255, 255, 255, 0.7);
    }

    #hud-quality button.active {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    /* 底部中間：目前相機目標提示 */
    #hud-target {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 1px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: opacity 0.6s ease;
      opacity: 0;
    }

    #hud-target.visible {
      opacity: 1;
    }

    /* 載入畫面 */
    #loading {
      position: fixed;
      z-index: 100;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 1.2s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading h1 {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 8px;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 8px;
    }

    #loading p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 3px;
    }

    #loading .bar {
      margin-top: 30px;
      width: 200px;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    #loading .bar-inner {
      width: 0%;
      height: 100%;
      background: rgba(255, 255, 255, 0.5);
      transition: width 0.3s ease;
    }

    @media (max-width: 640px) {
      #hud-info { font-size: 10px; padding: 12px 14px; min-width: 140px; top: 16px; left: 16px; }
      #hud-quality { top: 16px; right: 16px; }
      #hud-quality button { padding: 4px 8px; font-size: 10px; }
      #hud-controls { bottom: 20px; padding: 8px 12px; gap: 6px; }
      #hud-controls button { padding: 5px 10px; font-size: 11px; }
      #loading h1 { font-size: 20px; letter-spacing: 4px; }
    }
  </style>
  <script type="module" crossorigin src="/cosmic-genesis/assets/index-D7UCF3jO.js"></script>
  <link rel="modulepreload" crossorigin href="/cosmic-genesis/assets/three-zdQX1W2e.js">
</head>
<body>

  <!-- ===== 載入畫面 ===== -->
  <div id="loading">
    <h1>✦ COSMIC GENESIS</h1>
    <p>宇宙創世模擬器</p>
    <div class="bar"><div class="bar-inner" id="loading-bar"></div></div>
  </div>

  <!-- ===== Three.js 渲染容器 ===== -->
  <div id="canvas-container"></div>

  <!-- ===== HUD 左上：模擬資訊 ===== -->
  <div id="hud-info">
    <div><span class="label">FPS</span><span class="value" id="hud-fps">0</span></div>
    <div><span class="label">Time</span><span class="value" id="hud-time">0.0 y</span></div>
    <div><span class="label">Particles</span><span class="value" id="hud-particles">0</span></div>
    <div><span class="label">Stars</span><span class="value" id="hud-stars">0</span></div>
    <div><span class="label">Galaxies</span><span class="value" id="hud-galaxies">0</span></div>
    <div><span class="label">Black Holes</span><span class="value" id="hud-bh">0</span></div>
    <div><span class="label">Events</span><span class="value" id="hud-events">0</span></div>
  </div>

  <!-- ===== HUD 右上：畫質切換 ===== -->
  <div id="hud-quality">
    <button class="active" data-quality="high">HQ</button>
    <button data-quality="medium">MQ</button>
    <button data-quality="low">LQ</button>
  </div>

  <!-- ===== HUD 底部：相機目標 ===== -->
  <div id="hud-target"></div>

  <!-- ===== HUD 右下：控制按鈕 ===== -->
  <div id="hud-controls">
    <button id="btn-pause">⏸ Pause</button>
    <button id="btn-fullscreen">⛶ Fullscreen</button>
    <button id="btn-screenshot">◉ Screenshot</button>
    <button id="btn-reset">⟳ Reset</button>
  </div>

</body>
</html>
